<title>삼성전자 성과급 계산기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #070b13;
    color: #e8eaf0;
    font-family: 'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
  select { -webkit-appearance: none; appearance: none; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

  #root { min-height: 100vh; display: flex; flex-direction: column; }

  /* Logic tab styles */
  .logic-text { font-size: 13px; color: #E2E8F0; line-height: 1.7; word-break: keep-all; }
  .logic-text b { color: #fff; }
  .logic-title { font-size: 14px; font-weight: 800; margin-bottom: 8px; margin-top: 16px; }
  .logic-title:first-child { margin-top: 0; }
  .logic-ul { padding-left: 20px; margin-top: 6px; margin-bottom: 10px; color: #CBD5E1; }
  .logic-ul li { margin-bottom: 5px; }

  /* Button hover effects */
  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.98); }

  /* Input focus */
  select:focus, input:focus { outline: none; }

  /* ── 반응형 레이아웃 구조 디자인 ── */
  .header {
    padding: 0 32px; height: 60px;
    background: rgba(7, 11, 19, 0.98);
    border-bottom: 1px solid rgba(255, 255, 255, 0.09);
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(16px);
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .nav-tabs { display: flex; gap: 2px; margin-left: 16px; background: rgba(255, 255, 255, 0.04); border-radius: 12px; padding: 4px; }
  
  .main-layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 60px); }
  .sidebar { width: 440px; min-width: 440px; border-right: 1px solid rgba(255, 255, 255, 0.1); overflow-y: auto; background: rgba(255, 255, 255, 0.015); transition: all 0.2s; }
  .content-panel { flex: 1; overflow-y: auto; background: transparent; transition: all 0.2s; }

  .summary-grid { display: grid; gap: 6px; margin-bottom: 16px; }
  .card-status-grid { display: grid; gap: 6px; margin-bottom: 10px; }
  .shares-grid { display: grid; gap: 6px; }
  .dc-ratio-grid { display: grid; gap: 6px; }

  /* 💻 PC 전용 CSS 클래스 */
  @media (min-width: 769px) {
    .hide-on-pc { display: none !important; }
  }

  /* 📱 모바일 및 태블릿 최적화 브레이크포인트 (768px 이하) */
  @media (max-width: 768px) {
    body { background:#080c14; }
    .header {
      height: auto; padding: 14px 14px 12px; flex-direction: column; gap: 10px;
      align-items: stretch; position: sticky; top: 0; overflow: hidden;
    }
    .header-left { flex-direction: column; align-items: stretch; gap: 10px; width: 100%; }
    .header-left > div:first-child { padding-right: 118px; min-height: 34px; }
    .header-right {
      position: absolute; right: 14px; top: 16px; text-align: right !important;
      border-top: none !important; padding-top: 0 !important; line-height: 1.35 !important;
      max-width: 112px; font-size: 9px !important;
    }
    .nav-tabs {
      margin-left: 0; width: 100%; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px; padding: 6px; justify-content: initial; border-radius: 16px;
    }
    .nav-tabs button {
      width: 100%; min-width: 0; justify-content: center; padding: 9px 4px !important;
      font-size: 11px !important; white-space: nowrap; border-radius: 12px !important; gap: 4px !important;
    }
    .nav-tabs button span:first-child { font-size: 13px !important; }
    .nav-tabs button span:last-child { font-size: 11px !important; letter-spacing: -0.04em; }
    
    .main-layout { flex-direction: column; height: auto; overflow: visible; }
    .sidebar { width: 100%; min-width: 100%; border-right: none; height: auto; overflow: visible; background:#080c14; }
    .content-panel { width: 100%; height: auto; overflow: visible; }
    .settings-content, .salary-content { padding: 12px 14px 28px !important; gap: 10px !important; }
    .field-box { border-radius: 16px !important; padding: 15px 16px !important; }
    
    .summary-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .card-status-grid { grid-template-columns: repeat(2, 1fr) !important; }

    .hide-on-mobile { display: none !important; }
  }

  /* 📲 초소형 모바일 기기 대응 (480px 이하) */
  @media (max-width: 480px) {
    .header { padding-left: 12px; padding-right: 12px; }
    .settings-content, .salary-content { padding-left: 12px !important; padding-right: 12px !important; }
    .field-box { padding: 13px 14px !important; }
    .card-status-grid { grid-template-columns: 1fr !important; }
    .shares-grid { grid-template-columns: 1fr !important; }
    .dc-ratio-grid { grid-template-columns: repeat(3, 1fr) !important; }

<script type="text/babel">
const { useState, useCallback, useEffect } = React;

const MAN = 10000;
const MAX_ANNUAL_WAGE = 1435501440;

function comma(n) { return Math.round(n).toLocaleString("ko-KR"); }
function fmtM(n) { return comma(Math.round(n)) + "만원"; }

function workIncomeDeduction(g) {
  if (g <= 5000000) return g * 0.70;
  if (g <= 15000000) return 3500000 + (g - 5000000) * 0.40;
  if (g <= 45000000) return 7500000 + (g - 15000000) * 0.15;
  if (g <= 100000000) return 12000000 + (g - 45000000) * 0.05;
  return 14750000; // 1억 초과 시 1475만원 고정
}

function progressiveTax(t) {
  if (t <= 0) return 0;
  const B = [
    [14000000,.06,0], [50000000,.15,1260000], [88000000,.24,5760000],
    [150000000,.35,15440000], [300000000,.38,19940000], [500000000,.40,25940000],
    [1000000000,.42,35940000], [Infinity,.45,65940000]
  ];
  for (const [l,r,d] of B) if (t <= l) return Math.max(0, t*r-d);
}

function totalTax(g) {
  return progressiveTax(Math.max(0, g - workIncomeDeduction(Math.max(0,g)))) * 1.1;
}

function calculateVWAPForPeriod(data, targetDateStr) {
  let totalValue = 0;
  let totalVolume = 0;
  data.forEach(item => {
    if (item.date >= targetDateStr) {
      totalValue += (item.close * item.volume);
      totalVolume += item.volume;
    }
  });
  return totalVolume === 0 ? 0 : (totalValue / totalVolume);
}

function NumInput({ value, onChange, step=1, color="#fff", size=16, min=undefined, max=undefined }) {
  const [local, setLocal] = React.useState(String(value));
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current || ref.current !== document.activeElement) {
      setLocal(String(value));
    }
  }, [value]);
  const clamp = (n) => {
    if (min !== undefined) n = Math.max(min, n);
    if (max !== undefined) n = Math.min(max, n);
    return n;
  };
  return (
    <input ref={ref} type="number" value={local} step={step}
      onChange={e => {
        setLocal(e.target.value);
        const n = parseFloat(e.target.value);
        if (!isNaN(n)) onChange(clamp(n));
      }}
      onBlur={e => {
        let n = parseFloat(e.target.value);
        if (isNaN(n)) n = (min !== undefined ? Math.max(min, 0) : 0);
        n = clamp(n);
        onChange(n);
        setLocal(String(n));
      }}
      style={{ width:"100%", background:"transparent", border:"none", outline:"none",
        color, fontSize:size, fontWeight:700, fontFamily:"inherit", padding:0 }} />
  );
}

function PriceInput({ val, set }) {

  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current || ref.current !== document.activeElement) {
      setLocal(String(val));
    }
  }, [val]);
  return (
    <input ref={ref} type="number" value={local}
      onChange={e => {
        setLocal(e.target.value);
        const n = parseInt(e.target.value, 10);
        if (!isNaN(n) && n > 0) set(n);
      }}
      onBlur={e => {
        const n = parseInt(e.target.value, 10);

      }}

  );
}

  // ── 다중 CORS 프록시 설정 ──────────────────────────────────────────────

  const PROXIES = [
    {
      name: "corsproxy",
      build: url => `https://corsproxy.io/?${encodeURIComponent(url)}`,

    },
    {
      name: "allorigins",

  // 여러 프록시를 순차 시도해 rawText 반환 (모두 실패 시 null)
  const fetchTextViaProxies = async (targetUrl, timeoutMs = 6000) => {
    for (const proxy of PROXIES) {
      try {
        const res = await Promise.race([
          fetch(proxy.build(targetUrl)),
          new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), timeoutMs)),
        ]);
        if (!res.ok) continue;
        const text = await proxy.extract(res);
        if (text && text.length > 20) return text;
      } catch(e) {
        console.warn(`[${proxy.name}] 실패:`, e.message);
      }
    }
    return null;
  };

  const calc = useCallback(() => {
    const buPct = burate * 10, saPct = 100 - buPct;
    const spThreshold = (simYear >= 2026 && simYear <= 2028) ? 200 : 100;
    const isSpEligible = profit >= spThreshold;
    const appliedRerate = isSpEligible ? rerate : 10;
    const appliedSprate = isSpEligible ? sprate : 0;
    const totalCount = cntMemory + cntCommon + cntLepan;
    const ids = ["memory", "common", "lepan"];

    // ── 특별경영성과급 배분 로직 ───────────────────────────────────────────
    // 핵심 제약: 공통 조직의 (부문분+사업부분) 합산 1인당 = 메모리 1인당 × 공통비율(ratCommon, 기본 0.7)
    // 르팡은 부문분만 지급 (사업부분 가중치 0)
    //
    // 역산 공식:
    //   총재원 = cntMemory×x + cntCommon×(ratCommon×x) + cntLepan×lepanPer
    //   le팡 1인당(lepanPer)은 메모리 대비 "부문분 비율"만큼 받음을 가정
    //   → lepanPer = x × (부문분이 전체에서 차지하는 비중)
    //
    //   메모리 기준: 부문분 비중 = (메모리 총액 중 부문분 비율)
    //   단순화: lepanPer = x × (buPct/100)
    //   → 총재원 = x × [cntMemory + ratCommon×cntCommon + (buPct/100)×cntLepan]
    //   → x = 총재원 / [cntMemory + ratCommon×cntCommon + (buPct/100)×cntLepan]
    const _calcSpDistrib = (fund) => {
      if (fund <= 0 || totalCount === 0) {
        return { perMemory:0, perCommon:0, perLepan:0, buPerMan:0, saPerMemory:0, saPerCommon:0, saPerLepan:0 };
      }
      const commonRatio = ratCommon; // 공통/메모리 비율 (기본값 0.7)
      const denom = cntMemory + commonRatio * cntCommon + (buPct / 100) * cntLepan;
      const perMemory = denom > 0 ? (fund / denom) / MAN : 0;
      const perCommon = perMemory * commonRatio;
      const perLepan  = perMemory * (buPct / 100);
      // 표시용 역산 분해 (부문분/사업부분)
      const buPerMan    = perLepan;              // 르팡 = 부문분만 → 부문분 단가
      const saPerMemory = perMemory - buPerMan;
      const saPerCommon = perCommon - buPerMan;
      const saPerLepan  = 0;
      return { perMemory, perCommon, perLepan, buPerMan, saPerMemory, saPerCommon, saPerLepan };
    };

    const opiTotalFund = profit * 1e12 * (appliedRerate / 100);
    const opiPerPersonBase = totalCount > 0 ? (opiTotalFund / totalCount) / MAN : 0;
    const t_opiTotalFund = profit * 1e12 * (rerate / 100);
    const t_opiPerPersonBase = totalCount > 0 ? (t_opiTotalFund / totalCount) / MAN : 0;
    const spTotalFund = profit * 1e12 * (appliedSprate / 100);
    const spD = _calcSpDistrib(spTotalFund);
    const spPerPerson = [spD.perMemory, spD.perCommon, spD.perLepan];
    const t_spTotalFund = profit * 1e12 * (sprate / 100);
    const t_spD = _calcSpDistrib(t_spTotalFund);
    const t_spPerPerson = [t_spD.perMemory, t_spD.perCommon, t_spD.perLepan];
    const myIdx = ids.indexOf(myDiv);
    const isCL1 = myCl === "CL1";
    const isCL4 = myCl === "CL4";
    const calculatedSalary = Math.round(mySalary * (1 + myRaise / 100));
    const curSalary = agreedSalary > 0 ? Math.round(agreedSalary) : calculatedSalary;
    let bonusSalary = curSalary + bizPerfBonus;
    let excessCash = 0;
    if (isCL4 && curSalary > 13000) { bonusSalary = 13000 + bizPerfBonus; excessCash = curSalary - 13000; }
    let perf = 1.0;
    if (isCL4) { if (myRating === "EM") perf = 1.4; else if (myRating === "ES") perf = 1.2; }
    
    const usePrice = vwapPrice ? vwapPrice : manualBasePrice;
    const opiCap = isCL1 ? (bonusSalary * 7.0) : (bonusSalary * 0.5 * perf);
    const opi = Math.min(opiPerPersonBase * perf, opiCap);
    const opiPct = opiCap > 0 ? Math.min(opi / opiCap * 100, 100) : 0;
    const t_opi = Math.min(t_opiPerPersonBase * perf, opiCap);
    let sp = 0, isSpFixed24 = false;
    let t_sp = 0;
    const isLepanDeficit = (simYear >= 2027) && (lepanDeficit !== "none");
    if (isSpEligible) {
      if (myDiv === "lepan" && isLepanDeficit) { sp = (bonusSalary * 0.24) * perf; isSpFixed24 = true; }
      else { sp = spPerPerson[myIdx] * perf; }
    }
    if (myDiv === "lepan" && isLepanDeficit) { t_sp = (bonusSalary * 0.24) * perf; }
    else { t_sp = t_spPerPerson[myIdx] * perf; }
    const lostOpi = isSpEligible ? 0 : Math.max(0, t_opi - opi);
    const lostSp = isSpEligible ? 0 : Math.max(0, t_sp - sp);
    const lostTotal = lostOpi + lostSp;
    // ── 과세표준: 연봉 + 업무성과급 + OPI + 특별성과급 + TAI 모두 포함 ──
    // bizPerfBonus는 annualGrossForTax에 이미 포함되어 있으므로 curW에 반영됨
    const annualGrossForTax = (isCL1 ? curSalary * 14 : curSalary) + bizPerfBonus;
    const curW = annualGrossForTax * MAN;
    const opiW = opi * MAN;
    const spW = sp * MAN;

    // ── 삼성 TAI(PI) 계산 ──────────────────────────────────────────────────
    // TAI(목표달성인센티브): 기준급 × 비율 × 2회(상/하반기)
    // 기준급 = 연봉 ÷ 24 (삼성 연봉 구조: 기준급 × 24 = 연봉)
    const samsungBasePay = bonusSalary / 24;
    const taiRateVal = parseFloat(samsungTaiRate);
    const samsungTaiHalf = samsungBasePay * taiRateVal;
    const samsungTaiAnnual = samsungTaiHalf * 2;
    const taiW = samsungTaiAnnual * MAN;

    // ── 세금 계산: 누적 방식으로 각 항목의 한계세율 적용 ──────────────────
    // 과세표준 순서: 연봉(+업무성과급) → OPI → 특별성과급 → TAI
    // 각 항목의 세금 = 해당 항목까지 합산한 총세금 - 직전 합산 총세금
    const totalIncW = curW + opiW + spW + taiW;
    const taxBaseOnly  = totalTax(curW);
    const taxWithOpi   = totalTax(curW + opiW);
    const taxWithSp    = totalTax(curW + opiW + spW);
    const taxWithAll   = totalTax(totalIncW);

    const opiTaxWon  = Math.max(0, taxWithOpi  - taxBaseOnly);
    const spTaxWon   = Math.max(0, taxWithSp   - taxWithOpi);
    const taiTaxWon  = Math.max(0, taxWithAll  - taxWithSp);

    const opiTax = opiTaxWon / MAN;
    const opiNet = Math.max(0, opi - opiTax);
    const tax    = spTaxWon  / MAN;
    const spNet  = Math.max(0, sp  - tax);
    const taiTax = taiTaxWon / MAN;
    const taiNet = Math.max(0, samsungTaiAnnual - taiTax);

    const taxRate    = spW  > 0 ? spTaxWon  / spW  : 0;
    const taiTaxRate = taiW > 0 ? taiTaxWon / taiW : 0;

    const taxBaseMan = Math.max(0, totalIncW - workIncomeDeduction(totalIncW)) / MAN;
    const mySpBu = spD.buPerMan * perf;
    const mySpSa = (myIdx === 0 ? spD.saPerMemory : myIdx === 1 ? spD.saPerCommon : spD.saPerLepan) * perf;
    const healthRate = 0.03545, ltcRatio = 0.1295;
    const prevW = prevWithholding * MAN;
    const baseHW = Math.min(prevW, MAX_ANNUAL_WAGE) * healthRate;
    const totHW = Math.min(totalIncW, MAX_ANNUAL_WAGE) * healthRate;
    const healthAdd = (totHW - baseHW) / MAN;
    const ltcAdd = healthAdd * ltcRatio;
    const healthTotal = healthAdd + ltcAdd;
    const healthMonthly = healthTotal / 12;
    const isHealthCapped = totalIncW > MAX_ANNUAL_WAGE;
    const third = spNet / 3;
    const sharesEach = usePrice > 0 ? Math.floor(third * MAN / usePrice) : 0;
    const hynixTotalCount = 35000;
    // ──────────────────────────────────────────────────────────────────────
    // 삼성전자 CL2+ 연봉제 월급 구조 (TAI/PI 기준급 산출 근거):
    //   월급 = 기준급 + 고정시간외수당 + 전환급
    //   전환급 = 기준급 × 83.9%
    //   고정시간외수당 = 기준급 × 16.1%  (연봉 역산 시)
    //   → 월급 합계 = 기준급 × (1 + 0.839 + 0.161) = 기준급 × 2.0
    //   → 연봉 = 월급 × 12 = 기준급 × 24
    //   따라서: 기준급 = 계약연봉 ÷ 24
    //
    // 하이닉스도 동일 기준급 체계라 가정 → 기준급 = 계약연봉 ÷ 24
    // 동일 계약연봉 가정: 삼성 전용 수당(업무성과급 등) 제외
    // ──────────────────────────────────────────────────────────────────────
    const hynixContractSalary = curSalary;           // 동일 계약연봉 (삼성 전용 수당 제외)
    const hynixBasePay = hynixContractSalary / 24;   // 월 기준급 = 계약연봉 ÷ 24
    const hynixPsThreshold = hynixBasePay * 10;      // PS 이월 기준: 기준급 × 10개월
    const hynixTaiRate = parseFloat(hynixMargin);
    const hynixTaiHalf = hynixBasePay * hynixTaiRate;  // 반기 PI = 기준급 × 비율
    const hynixTaiAnnual = hynixTaiHalf * 2;           // 연간 PI = 반기 × 2회
    const hynixDcPct = hynixDcRate / 100;
    const hynixBaseW = hynixContractSalary * MAN;    // 하이닉스 세금 기준 = 동일 계약연봉
    // 두 시나리오 계산 헬퍼
    const _calcHynixPS = (profitFactor) => {
      const hProfit = profit * profitFactor;
      const hPsTotalFund = hProfit * 1e12 * 0.10;
      const hPsAmt = hynixTotalCount > 0 ? (hPsTotalFund / hynixTotalCount) / MAN : 0;
      const hPsThisYear = hPsAmt > hynixPsThreshold ? hPsAmt * 0.8 : hPsAmt;
      const hTotal = hPsThisYear + hynixTaiAnnual;
      const hDcAmt = hTotal * hynixDcPct;
      const hCash = hTotal - hDcAmt;
      const hTaxFull = totalTax(hynixBaseW + hTotal * MAN);
      const hTaxCash = totalTax(hynixBaseW + hCash * MAN);
      const hDcSaving = Math.max(0, hTaxFull - hTaxCash) / MAN;
      const hDcMargRate = hDcAmt > 0 ? (hDcSaving / hDcAmt) * 100 : 0;
      // 세후 계산 (한계세율 적용)

              <div style={{background:"rgba(255,180,0,0.08)", border:"1px solid rgba(255,180,0,0.2)", borderRadius:8, padding:"8px 10px", marginTop:6, marginBottom:6, fontSize:12, color:"#CBD5E1"}}>
                예) DS 영업이익 350조 → 특별경영성과급 재원 = <b>350조 × 10.5% = 36.75조원</b><br/>
                ✅ 허들(조건) 달성 시에만 지급 · 지급 형태는 <b>자사주 3분할(즉시·1년·2년)</b>
              </div>

              <div className="logic-title" style={{color:"#FFB400"}}>✅ 요건 2 — 배분 핵심 제약: 공통 = 메모리의 70% 고정</div>

              <div style={{background:"rgba(255,180,0,0.12)", border:"1.5px solid rgba(255,180,0,0.4)", borderRadius:10, padding:"10px 12px", marginBottom:10, fontSize:12, color:"#E2E8F0"}}>
                🔑 <b>핵심 원칙</b><br/>
                공통 조직의 <b>(부문분 + 사업부분) 합산 1인당 특별성과급 = 메모리 사업부 1인당의 70% 고정</b><br/>
                르팡(파운드리·S.LSI)은 <b>부문분만 지급</b> (사업부분 없음)
              </div>

              <div style={{marginBottom:4, fontSize:12, fontWeight:700, color:"#E2E8F0"}}>🔹 역산 공식</div>
              <div style={{fontSize:11, color:"#94A3B8", marginBottom:8, lineHeight:1.8}}>
                x = 메모리 1인당 특별성과급 (목표 변수)<br/>
                공통 1인당 = 0.70 × x<br/>
                르팡 1인당 = x × (부문분 비율%) — 부문분 비중만큼만 지급<br/>
                <br/>
                총재원 = x × 메모리인원 + (0.70×x) × 공통인원 + (부문분%) × x × 르팡인원<br/>
                총재원 = x × [메모리인원 + 0.70 × 공통인원 + 부문분% × 르팡인원]<br/>
                <b>x = 총재원 ÷ [메모리인원 + 0.70 × 공통인원 + 부문분% × 르팡인원]</b>
              </div>

              <div style={{marginTop:8, marginBottom:4, fontSize:12, fontWeight:700, color:"#E2E8F0"}}>🔹 사업부별 지급 결과</div>
              <ul className="logic-ul">
                <li>메모리: <b>x</b> (기준값 — 가장 높음)</li>
                <li>공통: <b>0.70 × x</b> (메모리의 70% 고정 — 부문분+사업부분 합산 기준)</li>
                <li>르팡: <b>부문분 단가</b>만 지급 (사업부분 0)</li>
              </ul>

              <div className="logic-title" style={{color:"#FFB400"}}>✅ 요건 3 — 재원 검증: 각 사업부 합산 = DS영업이익 × 10.5%</div>
              <div style={{fontSize:11, color:"#CBD5E1", lineHeight:1.7}}>
                역산 공식에 의해 x가 결정되면:<br/>
                • 메모리 배분 합계 = x × 메모리인원<br/>
                • 공통 배분 합계 = 0.70×x × 공통인원<br/>
                • 르팡 배분 합계 = 부문분단가 × 르팡인원<br/>
                • 합산 = 총재원 = DS영업이익 × 10.5% <b>✅ 완전 소진</b>
              </div>
              <div style={{background:"rgba(0,220,130,0.08)", border:"1px solid rgba(0,220,130,0.2)", borderRadius:8, padding:"8px 10px", marginTop:8, fontSize:12, color:"#CBD5E1"}}>
                수치 예시 (DS영업이익 350조, 부문:사업부 = 40:60, 메모리 2.74만명·공통 2.9만명·르팡 2.09만명):<br/>
                총 재원 = 36.75조<br/>
                분모 = 27400 + 0.7×29000 + 0.4×20900 = 27400 + 20300 + 8360 = 56,060명<br/>
                메모리 1인당 x = 36.75조 ÷ 56,060명 ≈ 655만원<br/>
                공통 1인당 = 655 × 70% ≈ 459만원<br/>
                메모리 합계 + 공통 합계 + 르팡 합계 = <b>36.75조원 ✅</b>
              </div>

              <div className="logic-title" style={{color:"#FFB400"}}>개인 최종 수령액</div>
              <div>지급액(세전) = <b>사업부별 1인당 × 개인 고과 배수</b></div>
              <ul className="logic-ul">
                <li>CL4 ES: 1.2배 / EM: 1.4배 · CL1~3: 1.0배</li>
                <li>자사주 3등분 지급: 즉시 1/3 + 1년 후 1/3 + 2년 후 1/3 (중도 퇴사 시 미수령분 몰수)</li>
              </ul>
            </div>
          </FieldBox>

          <FieldBox label="SK하이닉스 PI·PS 비교 계산 기준" accent="rgba(255,100,100,0.3)">
            <div className="logic-text">
              <div className="logic-title" style={{color:"#FF6B6B"}}>1. 삼성전자 CL2+ 월급 구조 (기준급 산출 근거)</div>
              <div>월급은 <b>기준급 + 고정시간외수당 + 전환급</b>의 3가지 항목으로 구성됩니다.</div>
              <ul className="logic-ul">
                <li>전환급 = 기준급 × <b>83.9%</b></li>
                <li>고정시간외수당 = 기준급 × <b>16.1%</b> (연봉 역산 기준)</li>
                <li>월급 합계 = 기준급 × (100% + 83.9% + 16.1%) = 기준급 × <b>200%</b></li>
                <li>연봉 = 월급 × 12 = <b>기준급 × 24</b> → <b>기준급 = 연봉 ÷ 24</b></li>
              </ul>
              <div style={{background:"rgba(255,100,100,0.08)", border:"1px solid rgba(255,100,100,0.2)", borderRadius:8, padding:"8px 10px", marginTop:2, marginBottom:6, fontSize:12, color:"#CBD5E1"}}>
                예시: 연봉 80,000,000원 (8,000만원)<br/>
                기준급 = 80,000,000 ÷ 24 = 3,333,333원<br/>
                전환급 = 3,333,333 × 83.9% = 2,796,667원<br/>
                고정시간외 = 3,333,333 × 16.1% = 536,667원<br/>
                월급 = 3,333,333 + 536,667 + 2,796,667 = 6,666,667원 ✓<br/>
                <span style={{color:"#94A3B8", fontSize:11}}>연봉 검증: 6,666,667 × 12 ≈ 80,000,000원 ✓</span>
              </div>

              <div className="logic-title" style={{color:"#FF6B6B"}}>2. 동일 계약연봉 가정</div>
              <div>하이닉스 비교는 <b>삼성전자와 동일한 계약연봉</b>을 기준으로 산출합니다.</div>
              <ul className="logic-ul">
                <li>삼성전자 연봉 입력값과 동일한 금액을 하이닉스 계약연봉으로 사용</li>
                <li>삼성 전용 항목(업무성과급 등 변동분)은 하이닉스 기준에서 제외</li>
              </ul>

              <div className="logic-title" style={{color:"#FF6B6B"}}>3. PI (생산성격려금) 계산</div>
              <div>PI는 <b>월 기준급</b>을 기준으로 지급됩니다. (삼성 TAI와 동일 기준 가정)</div>
              <ul className="logic-ul">
                <li>월 기준급 = <b>계약연봉 ÷ 24</b></li>
                <li>반기 PI = 월 기준급 × 영업이익률 구간별 비율 (0% ~ 150%)</li>
                <li>연간 PI = 반기 PI × 2회 (상·하반기)</li>
              </ul>
              <div style={{background:"rgba(255,100,100,0.08)", border:"1px solid rgba(255,100,100,0.25)", borderRadius:8, padding:"8px 10px", marginTop:6, fontSize:12, color:"#CBD5E1"}}>
                예시: 연봉 8,000만원 → 기준급 333만원<br/>
                영업이익률 30%↑(PI 150%): 반기 PI = 333 × 150% = 500만원 → 연간 1,000만원
              </div>

              <div className="logic-title" style={{color:"#FF6B6B"}}>4. PS (초과이익분배금) 계산</div>
              <div>PS는 <b>영업이익의 10%</b>를 전체 인원으로 균등 배분합니다.</div>
              <ul className="logic-ul">
                <li>PS 1인당 = 영업이익 × 10% ÷ 3.5만명</li>
                <li>PS 금액 {">"} 기준급 × 10개월 초과 시: 80% 당해 지급, 20% 이듬해 지급</li>
              </ul>

              <div className="logic-title" style={{color:"#FF6B6B"}}>5. 세금 적용</div>
              <div>하이닉스 세금은 <b>동일 계약연봉 기준</b>으로 한계세율 방식으로 추정합니다.</div>
              <ul className="logic-ul">
                <li>세금 기준 연소득 = 하이닉스 계약연봉 (삼성 업무성과급 제외)</li>
                <li>성과급(PS+PI)에 한계세율 적용 → 삼성과 동일한 누진세율 구조 사용</li>
              </ul>
            </div>
          </FieldBox>

          <FieldBox label="세금 및 건강보험료 추정" accent="rgba(0,220,130,0.3)">
            <div className="logic-text">
              <div className="logic-title" style={{color:"#00DC82"}}>1. 근로소득공제 및 과세표준 산출</div>
              <div>총소득에서 <b>근로소득공제</b>를 차감하여 과세표준을 산출합니다.</div>
              <ul className="logic-ul">
                <li>기준: <b>당해 총소득 (기준연봉 + 업무성과급 + OPI + 특별성과급 + TAI/PI 전부 합산)</b></li>
                <li>TAI(PI)와 업무성과급도 근로소득으로서 동일하게 누진세율 과세 대상입니다.</li>
                <li>각 항목의 세금은 <b>누적 방식</b>으로 계산됩니다: 연봉 → OPI → SP → TAI 순서로 이전 합산 세액과의 차이로 산출.</li>
                <li>근로소득공제 한도: 총급여 1억 원 초과 시 <b>최대 1,475만 원</b>으로 고정됩니다.</li>
              </ul>

              <div className="logic-title" style={{color:"#00DC82"}}>2. 소득세율 구간 (누진세율 적용)</div>
              <div>과세표준에 따라 <b>6% ~ 45%</b>의 누진세율이 적용됩니다.</div>
              <ul className="logic-ul">
                <li>1,400만 원 이하: <b>6%</b> | 5,000만 원 이하: <b>15%</b></li>
                <li>8,800만 원 이하: <b>24%</b> | 1.5억 원 이하: <b>35%</b></li>
                <li>3억 원 이하: <b>38%</b> | 5억 원 이하: <b>40%</b></li>
                <li><b>지방소득세 가산:</b> 산출된 근로소득세의 <b>10%</b>가 추가 부과됩니다. (실제 구간별 체감세율은 6.6% ~ 49.5%)</li>
              </ul>

              <div className="logic-title" style={{color:"#00DC82"}}>3. 성과급 한계세율 (세금 폭탄의 이유)</div>
              <div>성과급은 연봉 위에 얹혀지는 '추가 소득'이므로, 본인의 <b>최상위 과세구간(한계세율)</b>이 통째로 적용됩니다.</div>
              <ul className="logic-ul">
                <li>예: 기준급이 이미 8,800만 원을 초과했다면, 추가로 들어오는 성과급 전액에 대해 <b>최소 38.5%</b> (소득세 35% + 지방세 3.5%)의 세금이 부과됩니다.</li>
              </ul>

              <div className="logic-title" style={{color:"#00DC82"}}>4. 건강보험료 및 장기요양보험료 정산 (차년도 4~5월)</div>
              <div>추가징수액 = <b>(올해 총소득 - 전년도 원천징수) × 건보료율(3.545%)</b></div>
              <ul className="logic-ul">
                <li>전년도 소득(기납부액) 대비 올해 소득이 증가한 만큼 다음 해 건보료 정산 시 추가 공제됩니다.</li>
                <li>장기요양보험료(건보료의 12.95%)도 비례하여 추가 징수됩니다.</li>
                <li><b>건보료 상한액:</b> 보수월액 상한액(24년 기준 연 14억 3,550만 원) 초과 소득에 대해서는 건보료가 더 이상 부과되지 않습니다.</li>
              </ul>
            </div>
          </FieldBox>
        </>
      )}
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", minHeight:"100vh", background:"#080c14" }}>
      {/* ── 상단 반응형 헤더 ── */}
      <div className="header">
        <div className="header-left">
          <div>
            <div style={{ fontSize:10, color:"#1E90FF", letterSpacing:"0.18em", fontWeight:700 }}>SAMSUNG ELECTRONICS</div>
            <div style={{ fontSize:17, fontWeight:900, background:"linear-gradient(90deg,#fff,#7ec8ff)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", lineHeight:1.2 }}>성과급 계산기</div>
          </div>
          <div className="nav-tabs">
            {tabs.map((t,i) => (
              <button key={i} onClick={() => setTab(i)} style={{
                padding:"7px 18px", border:"none", cursor:"pointer", fontFamily:"inherit",
                borderRadius:9, display:"flex", alignItems:"center", gap:6,
                background: tab===i ? "rgba(30,144,255,0.18)" : "none",
                transition:"all .18s",
              }}>
                <span style={{ fontSize:15 }}>{t.icon}</span>
                <span style={{ fontSize:13, fontWeight:700, color: tab===i ? "#4DA8FF" : "#94A3B8" }}>{t.label}</span>
              </button>
            ))}
          </div>
        </div>
        <div className="header-right" style={{ fontSize:10, color:"#94A3B8", textAlign:"right", lineHeight:1.5 }}>
          made by<br/><span style={{ color:"#E2E8F0", fontWeight:700 }}>초기업_눙물이또르륵</span>
        </div>
      </div>

      {/* ── 반응형 바디 레이아웃 ── */}
      <div className="main-layout">
        {/* 연봉저장/게시판 탭: 전체 너비로 표시 */}
        {tab === 4 ? (
          <div style={{ flex:1, overflowY:'auto', background:'transparent', maxWidth:760, margin:'0 auto', width:'100%' }}>
            {SalaryContent()}
          </div>
        ) : tab === 5 ? (
          <div style={{ flex:1, overflowY:'auto', background:'transparent' }}>
            <CommentBoard />
          </div>
        ) : (
          <>
            {/* PC: 탭 2(결과) 선택 시 숨김 | 모바일: 탭 2(결과) 선택 시 숨김 */}
            <div className={`sidebar ${tab === 2 ? 'hide-on-pc hide-on-mobile' : ''}`}>
              {SettingsContent()}
            </div>
            
            {/* PC: 항상 보임 (대시보드) | 모바일: 탭 2(결과) 선택 시에만 보임 */}
            <div className={`content-panel ${tab !== 2 ? 'hide-on-mobile' : ''}`}>
              <div style={{ maxWidth: tab === 2 ? "800px" : "100%", margin: "0 auto", width: "100%", height: "100%" }}>
                {ResultPanel()}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
