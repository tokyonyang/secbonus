<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

    background: #070b13;
    color: #e8eaf0;
    font-family: 'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

  #root { min-height: 100vh; display: flex; flex-direction: column; }

  /* Logic tab styles */
  .logic-text { font-size: 13px; color: #E2E8F0; line-height: 1.7; word-break: keep-all; }

  /* Button hover effects */
  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.98); }

  /* Input focus */

  /* ── 반응형 레이아웃 구조 디자인 ── */
  .header {
    padding: 0 32px; height: 60px;
    background: rgba(7, 11, 19, 0.98);
    border-bottom: 1px solid rgba(255, 255, 255, 0.09);
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(16px);
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .nav-tabs { display: flex; gap: 2px; margin-left: 16px; background: rgba(255, 255, 255, 0.04); border-radius: 12px; padding: 4px; overflow-x: auto; }
  
  .main-layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 60px); }
  .sidebar { width: 440px; min-width: 440px; border-right: 1px solid rgba(255, 255, 255, 0.1); overflow-y: auto; background: rgba(255, 255, 255, 0.015); transition: all 0.2s; }
  .content-panel { flex: 1; overflow-y: auto; background: transparent; transition: all 0.2s; }

  .summary-grid { display: grid; gap: 6px; margin-bottom: 16px; }
  .card-status-grid { display: grid; gap: 6px; margin-bottom: 10px; }
  .shares-grid { display: grid; gap: 6px; }
  .dc-ratio-grid { display: grid; gap: 6px; }

  /* 💻 PC 전용 CSS 클래스 */
  @media (min-width: 769px) {
    .hide-on-pc { display: none !important; }
  }

  /* 📱 모바일 및 태블릿 최적화 브레이크포인트 (768px 이하) */
  @media (max-width: 768px) {
    .header { height: auto; padding: 14px 16px; flex-direction: column; gap: 12px; align-items: stretch; position: relative; }
    .header-left { flex-direction: column; align-items: flex-start; gap: 12px; width: 100%; }
    .nav-tabs { margin-left: 0; width: 100%; justify-content: flex-start; }
    .nav-tabs button { flex: 0 0 auto; justify-content: center; padding: 9px 8px !important; font-size: 11.5px !important; white-space: nowrap; }
    .header-right { text-align: left !important; border-top: 1px solid rgba(255, 255, 255, 0.07); padding-top: 8px; }
    
    .main-layout { flex-direction: column; height: auto; overflow: visible; }
    .sidebar { width: 100%; min-width: 100%; border-right: none; height: auto; overflow: visible; }
    .content-panel { width: 100%; height: auto; overflow: visible; }
    
    .summary-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .card-status-grid { grid-template-columns: repeat(2, 1fr) !important; }

    .hide-on-mobile { display: none !important; }
  }

  /* 📲 초소형 모바일 기기 대응 (480px 이하) */
  @media (max-width: 480px) {
    .card-status-grid { grid-template-columns: 1fr !important; }
    .shares-grid { grid-template-columns: 1fr !important; }
    .dc-ratio-grid { grid-template-columns: repeat(3, 1fr) !important; }
  }

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useCallback, useEffect } = React;

const MAN = 10000;
const MAX_ANNUAL_WAGE = 1435501440;

function comma(n) { return Math.round(n).toLocaleString("ko-KR"); }
function fmtM(n) { return comma(Math.round(n)) + "만원"; }

function workIncomeDeduction(g) {
  if (g <= 5000000) return g * 0.70;
  if (g <= 15000000) return 3500000 + (g - 5000000) * 0.40;
  if (g <= 45000000) return 7500000 + (g - 15000000) * 0.15;
  if (g <= 100000000) return 12000000 + (g - 45000000) * 0.05;
  return 14750000; // 1억 초과 시 1475만원 고정
}

function progressiveTax(t) {
  if (t <= 0) return 0;
  const B = [
    [14000000,.06,0], [50000000,.15,1260000], [88000000,.24,5760000],
    [150000000,.35,15440000], [300000000,.38,19940000], [500000000,.40,25940000],
    [1000000000,.42,35940000], [Infinity,.45,65940000]
  ];
  for (const [l,r,d] of B) if (t <= l) return Math.max(0, t*r-d);
}

function totalTax(g) {
  return progressiveTax(Math.max(0, g - workIncomeDeduction(Math.max(0,g)))) * 1.1;
}

function calculateVWAPForPeriod(data, targetDateStr) {
  let totalValue = 0;
  let totalVolume = 0;
  data.forEach(item => {
    if (item.date >= targetDateStr) {
      totalValue += (item.close * item.volume);
      totalVolume += item.volume;
    }
  });
  return totalVolume === 0 ? 0 : (totalValue / totalVolume);
}

/* ── 공통 컴포넌트 ── */
function Slider({ value, min, max, step, onChange, color="#00C6FF" }) {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div style={{ position:"relative", height:36, display:"flex", alignItems:"center" }}>
      <div style={{ position:"absolute", left:0, right:0, height:7, background:"rgba(255,255,255,0.07)", borderRadius:99 }}>
        <div style={{ width:`${pct}%`, height:"100%", background:`linear-gradient(90deg,${color}88,${color})`, borderRadius:99 }} />
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(+e.target.value)}
        style={{ position:"absolute", inset:0, width:"100%", opacity:0, cursor:"pointer", height:"100%", margin:0, zIndex:2 }} />
      <div style={{
        position:"absolute", left:`calc(${pct}% - 13px)`, top:"50%", transform:"translateY(-50%)",
        width:26, height:26, borderRadius:"50%", background:color,
        boxShadow:`0 0 14px ${color}88`, pointerEvents:"none",
        border:"2px solid rgba(255,255,255,0.35)", zIndex:1
      }} />
    </div>
  );
}

function FieldBox({ label, children, accent }) {
  return (
      <div style={{
        background:"rgba(255,255,255,0.04)",
        border:`1px solid ${accent||"rgba(255,255,255,0.1)"}`,
        borderRadius:14, padding:"14px 16px"
      }}>
      {label && (
        <div style={{ fontSize:10, color:"#CBD5E1", letterSpacing:"0.12em", marginBottom:10, fontWeight:800, textTransform:"uppercase" }}>
          {label}
        </div>
      )}
      {children}
    </div>
  );
}

function ChipGroup({ options, value, onChange }) {
  return (
    <div style={{ display:"flex", gap:7 }}>
      {options.map(o => (
        <button key={o.value} onClick={() => onChange(o.value)} style={{
          flex:1, padding:"11px 4px", borderRadius:11, fontSize:13, fontWeight:700,
          border: value===o.value ? `1.5px solid ${o.color||"#00C6FF"}` : "1.5px solid rgba(255,255,255,0.1)",
          background: value===o.value ? `${o.color||"#00C6FF"}18` : "rgba(255,255,255,0.04)",
          color: value===o.value ? (o.color||"#00C6FF") : "#94A3B8",
          cursor:"pointer", transition:"all .18s", fontFamily:"inherit", minWidth:0,
        }}>
          {o.label}
        </button>
      ))}
    </div>
  );
}

function NumInput({ value, onChange, step=1, color="#fff", size=16, min=undefined, max=undefined }) {
  const [local, setLocal] = React.useState(String(value));
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current || ref.current !== document.activeElement) {
      setLocal(String(value));
    }
  }, [value]);
  const clamp = (n) => {
    if (min !== undefined) n = Math.max(min, n);
    if (max !== undefined) n = Math.min(max, n);
    return n;
  };
  return (
    <input ref={ref} type="number" value={local} step={step}
      onChange={e => {
        setLocal(e.target.value);
        const n = parseFloat(e.target.value);
        if (!isNaN(n)) onChange(clamp(n));
      }}
      onBlur={e => {
        let n = parseFloat(e.target.value);
        if (isNaN(n)) n = (min !== undefined ? Math.max(min, 0) : 0);
        n = clamp(n);
        onChange(n);
        setLocal(String(n));
      }}
      style={{ width:"100%", background:"transparent", border:"none", outline:"none",
        color, fontSize:size, fontWeight:700, fontFamily:"inherit", padding:0 }} />
  );
}

function PriceInput({ val, set }) {
  const [local, setLocal] = React.useState(String(val));
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current || ref.current !== document.activeElement) {
      setLocal(String(val));
    }
  }, [val]);
  return (
    <input ref={ref} type="number" value={local}
      onChange={e => {
        setLocal(e.target.value);
        const n = parseInt(e.target.value, 10);
        if (!isNaN(n) && n > 0) set(n);
      }}
      onBlur={e => {
        const n = parseInt(e.target.value, 10);
        const safe = (!isNaN(n) && n > 0) ? n : val;
        set(safe);
        setLocal(String(safe));
      }}
      style={{ background:"transparent", border:"none", outline:"none", color:"#FFB400", fontSize:17, fontWeight:700, fontFamily:"inherit", width:110, textAlign:"right" }}/>
  );
}

function ResultCard({ icon, title, valueColor, sub, value, accent, children }) {
  return (
    <div style={{
      background:`linear-gradient(135deg,${accent||"rgba(0,198,255,0.06)"},transparent)`,
      border:`1px solid ${accent?accent+"55":"rgba(0,198,255,0.18)"}`,
      borderRadius:16, padding:"16px 18px", marginBottom:10
    }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12, flexWrap:"wrap", gap:8 }}>
        <div>
          <div style={{ fontSize:15, fontWeight:800, color:valueColor||"#00C6FF", marginBottom:5 }}>{icon} {title}</div>
          {sub && <div style={{ fontSize:11, color:"#CBD5E1" }}>{sub}</div>}
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:24, fontWeight:900, color:valueColor||"#00C6FF", lineHeight:1.1 }}>{value}</div>
        </div>
      </div>
      {children}
    </div>
  );
}

/* ── 연봉 DB 컴포넌트 (신규) ── */
function SalaryDB({ contractedSalary, setContractedSalary }) {
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');

  const [records, setRecords] = useState([]);
  const [inputYear, setInputYear] = useState('2025');
  const [inputSalary, setInputSalary] = useState('');

  const handleLogin = () => {
    if(!email || !pw) return alert('아이디와 비밀번호를 입력해주세요.');
    setIsLoggedIn(true);
    // 모의 DB 로딩 (localStorage 활용)
    const saved = localStorage.getItem('salary_db_' + email);
    if(saved) setRecords(JSON.parse(saved));
  };

  const handleLogout = () => {
    setIsLoggedIn(false);
    setEmail('');
    setPw('');
    setRecords([]);
  };

  const handleSave = () => {
    if(!inputYear || !inputSalary) return alert('연도와 연봉을 모두 기입해주세요.');
    const newRecord = { id: Date.now(), year: Number(inputYear), salary: Number(inputSalary) };
    const filtered = records.filter(r => r.year !== Number(inputYear)); // 해당 연도 덮어쓰기
    const updated = [...filtered, newRecord].sort((a,b) => b.year - a.year);
    
    setRecords(updated);
    // 모의 DB 저장
    localStorage.setItem('salary_db_' + email, JSON.stringify(updated));
    setInputSalary('');
  };

  const handleDelete = (id) => {
    if(!confirm('이 기록을 삭제하시겠습니까?')) return;
    const updated = records.filter(r => r.id !== id);
    setRecords(updated);
    localStorage.setItem('salary_db_' + email, JSON.stringify(updated));
  };

  if (!isLoggedIn) {
    return (
      <div style={{ maxWidth: 480, margin: '0 auto', padding: '40px 20px', width: '100%' }}>
        <FieldBox label="🔐 연봉 DB 로그인" accent="rgba(0, 220, 130, 0.4)">
          <div style={{ fontSize:12, color:"#94A3B8", marginBottom:16, lineHeight:1.6 }}>
            개인 연봉 정보는 민감한 데이터입니다.<br/>
            본인만의 안전한 계정으로 접속하여 연도별 연봉을 누적 관리하세요.
          </div>
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize:11, color:"#CBD5E1", marginBottom:5 }}>아이디 (이메일)</div>
            <input type="text" value={email} onChange={e=>setEmail(e.target.value)} style={{width:'100%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'10px 13px', color:'#E2E8F0', fontSize:14, outline:'none'}} placeholder="아이디 입력" />
          </div>
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize:11, color:"#CBD5E1", marginBottom:5 }}>비밀번호</div>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} style={{width:'100%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'10px 13px', color:'#E2E8F0', fontSize:14, outline:'none'}} placeholder="비밀번호 입력" />
          </div>
          <button onClick={handleLogin} style={{ width:'100%', padding:14, borderRadius:10, background:'linear-gradient(135deg,#00DC82,#00B068)', border:'none', color:'#fff', fontSize:14, fontWeight:800, cursor:'pointer' }}>DB 접속하기</button>
        </FieldBox>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 720, margin: '0 auto', padding: '20px 18px 60px', width: '100%' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
        <div>
          <div style={{ fontSize:11, color:"#00DC82", fontWeight:800, marginBottom:4, letterSpacing:'0.12em' }}>SALARY DATABASE</div>
          <div style={{ fontSize:20, fontWeight:900, color:"#fff" }}>{email} 님의 연봉 기록</div>
        </div>
        <button onClick={handleLogout} style={{ background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', color:'#94A3B8', padding:'6px 12px', borderRadius:8, fontSize:12, cursor:'pointer' }}>로그아웃</button>
      </div>

      <FieldBox label="새 연봉 정보 기입" accent="rgba(30, 144, 255, 0.3)">
        <div style={{ display:'flex', gap:10, alignItems:'flex-end', flexWrap:'wrap' }}>
          <div style={{ flex: '1 1 120px' }}>
            <div style={{ fontSize:11, color:"#CBD5E1", marginBottom:5 }}>체결 연도</div>
            <select value={inputYear} onChange={e=>setInputYear(e.target.value)} style={{width:'100%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'10px 13px', color:'#E2E8F0', fontSize:14, outline:'none'}}>
              {[2025, 2026, 2027, 2028, 2029, 2030].map(y => <option key={y} value={y}>{y}년</option>)}
            </select>
          </div>
          <div style={{ flex: '2 1 200px' }}>
            <div style={{ fontSize:11, color:"#CBD5E1", marginBottom:5 }}>계약 연봉 (만원)</div>
            <input type="number" value={inputSalary} onChange={e=>setInputSalary(e.target.value)} placeholder="예: 8500" style={{width:'100%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'10px 13px', color:'#E2E8F0', fontSize:14, outline:'none'}} />
          </div>
          <button onClick={handleSave} style={{ padding:'10px 20px', borderRadius:10, background:'linear-gradient(135deg,#1E90FF,#0070CC)', border:'none', color:'#fff', fontSize:14, fontWeight:800, cursor:'pointer', height: '41px' }}>누적 저장</button>
        </div>
      </FieldBox>

      <div style={{ marginTop: 24 }}>
        <div style={{ fontSize:13, fontWeight:800, color:"#CBD5E1", marginBottom:12 }}>누적 연봉 내역</div>
        {records.length === 0 ? (
            <div style={{ textAlign:'center', padding:'30px', color:'#64748B', fontSize:13, background:'rgba(255,255,255,0.02)', borderRadius:12 }}>등록된 연봉 내역이 없습니다.</div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {records.map(r => (
              <div key={r.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:12, padding:'14px 16px', flexWrap:'wrap', gap:10 }}>
                <div>
                  <div style={{ fontSize:12, color:'#94A3B8', marginBottom:4 }}>{r.year}년 계약 연봉</div>
                  <div style={{ fontSize:18, fontWeight:900, color:'#00DC82' }}>{r.salary.toLocaleString()} <span style={{fontSize:13, color:'#CBD5E1', fontWeight:600}}>만원</span></div>
                </div>
                <div style={{ display:'flex', gap:8 }}>
                  <button onClick={() => { setContractedSalary(r.salary); alert(`${r.year}년 연봉(${r.salary}만원)이 올해 체결 연봉으로 계산기에 반영되었습니다.`); }} style={{ background:'rgba(0,220,130,0.1)', border:'1px solid rgba(0,220,130,0.3)', color:'#00DC82', padding:'6px 12px', borderRadius:8, fontSize:12, fontWeight:700, cursor:'pointer' }}>계산기 적용</button>
                  <button onClick={() => handleDelete(r.id)} style={{ background:'transparent', border:'1px solid rgba(255,107,107,0.3)', color:'#FF6B6B', padding:'6px 12px', borderRadius:8, fontSize:12, cursor:'pointer' }}>삭제</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── 게시판 컴포넌트 ── */
function CommentBoard() {
  const [comments, setComments] = React.useState([]);
  const [nick, setNick] = React.useState('');
  const [text, setText] = React.useState('');
  const [loading, setLoading] = React.useState(true);
  const [submitting, setSubmitting] = React.useState(false);
  const [errMsg, setErrMsg] = React.useState('');
  const [successMsg, setSuccessMsg] = React.useState('');
  const [deleteTarget, setDeleteTarget] = React.useState(null);
  const [deletePw, setDeletePw] = React.useState('');
  const [pw, setPw] = React.useState('');
  const textRef = React.useRef(null);

  React.useEffect(() => { loadComments(); }, []);

  const loadComments = async () => {
    setLoading(true);
    try {
      const result = localStorage.getItem('board-comments');
      if (result) {
        const parsed = JSON.parse(result);
        setComments(Array.isArray(parsed) ? parsed : []);
      } else {
        setComments([]);
      }
    } catch(e) {
      setComments([]);
    }
    setLoading(false);
  };

  const submitComment = async () => {
    if (!nick.trim()) { setErrMsg('닉네임을 입력해주세요.'); return; }
    if (!text.trim()) { setErrMsg('내용을 입력해주세요.'); return; }
    if (text.trim().length < 5) { setErrMsg('내용을 5자 이상 입력해주세요.'); return; }
    if (!pw.trim()) { setErrMsg('삭제용 비밀번호를 입력해주세요.'); return; }
    setErrMsg('');
    setSubmitting(true);
    const newComment = {
      id: Date.now() + Math.random(),
      nick: nick.trim().slice(0, 20),
      text: text.trim().slice(0, 500),
      pw: pw.trim(),
      time: new Date().toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }),
      likes: 0,
    };
    const updated = [newComment, ...comments];
    try {
      localStorage.setItem('board-comments', JSON.stringify(updated));
      setComments(updated);
      setText('');
      setPw('');

    setMyCl(newCl);

  const [currentPrice, setCurrentPrice] = useState(null);
  const [priceLoading, setPriceLoading] = useState(false);
  const [priceSource, setPriceSource] = useState(null); 
  const [vwapPrice, setVwapPrice] = useState(null);
  const [vwapLoading, setVwapLoading] = useState(false);
  const [vwapSource, setVwapSource] = useState(null); 

  // ── 다중 CORS 프록시 설정 ──────────────────────────────────────────────
  const PROXIES = [
    {
      name: "corsproxy",
      build: url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      extract: async res => res.text(),
    },
    {
      name: "allorigins",
      build: url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
      extract: async res => { const d = await res.json(); return d.contents; },
    },
    {
      name: "codetabs",
      build: url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
      extract: async res => res.text(),
    },
  ];

  const fetchTextViaProxies = async (targetUrl, timeoutMs = 6000) => {
    for (const proxy of PROXIES) {
      try {
        const res = await Promise.race([
          fetch(proxy.build(targetUrl)),
          new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), timeoutMs)),
        ]);
        if (!res.ok) continue;
        const text = await proxy.extract(res);
        if (text && text.length > 20) return text;
      } catch(e) {
        console.warn(`[${proxy.name}] 실패:`, e.message);
      }
    }
    return null;
  };

  const fetchCurrentPrice = async () => {
    setPriceLoading(true);
    setPriceSource(null);

    try {
      const text = await fetchTextViaProxies("https://m.stock.naver.com/api/stock/005930/basic");
      if (text) {
        const parsed = JSON.parse(text);
        const raw = parsed?.closePrice ?? parsed?.stockPrice?.closePrice;
        if (raw) {
          setCurrentPrice(parseInt(String(raw).replace(/,/g, ""), 10));
          setPriceSource("naver");
          setPriceLoading(false);
          return;
        }
      }
    } catch(e) { console.warn("네이버 현재가 파싱 실패", e); }

    try {
      const yahooUrl = "https://query1.finance.yahoo.com/v8/finance/chart/005930.KS?interval=1d&range=5d";
      const text = await fetchTextViaProxies(yahooUrl);
      if (text) {
        const data = JSON.parse(text);
        const quotes = data?.chart?.result?.[0]?.indicators?.quote?.[0]?.close ?? [];
        const lastClose = quotes.filter(Boolean).slice(-1)[0];
        if (lastClose) {
          setCurrentPrice(Math.round(lastClose));
          setPriceSource("yahoo");
          setPriceLoading(false);
          return;
        }
      }
    } catch(e) { console.warn("Yahoo 현재가 파싱 실패", e); }

    console.error("현재가 조회 실패 — 모든 소스 응답 없음");
    setPriceLoading(false);
  };

  const fetchVwapPrice = async () => {
    setVwapLoading(true);
    setVwapSource(null);

    const calcFinalVwap = (stockData) => {
      if (!stockData.length) return null;
      const latestDate = new Date(stockData[stockData.length - 1].date);
      const oneWeekAgo   = new Date(latestDate); oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
      const oneMonthAgo  = new Date(latestDate); oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
      const twoMonthsAgo = new Date(latestDate); twoMonthsAgo.setMonth(twoMonthsAgo.getMonth() - 2);
      const v1w = calculateVWAPForPeriod(stockData, oneWeekAgo.getTime());
      const v1m = calculateVWAPForPeriod(stockData, oneMonthAgo.getTime());
      const v2m = calculateVWAPForPeriod(stockData, twoMonthsAgo.getTime());
      return Math.round((v1w + v1m + v2m) / 3);
    };

    try {
      const naverUrl = "https://fchart.stock.naver.com/sise.nhn?symbol=005930&timeframe=day&count=60&requestType=0";
      const text = await fetchTextViaProxies(naverUrl);
      if (text) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(text, "text/xml");
        const items = xmlDoc.getElementsByTagName("item");
        const stockData = [];
        for (let i = 0; i < items.length; i++) {
          const dataStr = items[i].getAttribute("data");
          if (!dataStr) continue;
          const parts = dataStr.split("|");
          const ds = parts[0];
          stockData.push({
            date: new Date(+ds.substring(0,4), +ds.substring(4,6)-1, +ds.substring(6,8)).getTime(),
            close: parseInt(parts[4], 10),
            volume: parseInt(parts[5], 10),
          });
        }
        if (stockData.length > 0) {
          const result = calcFinalVwap(stockData);
          if (result) {
            setVwapPrice(result);
            setVwapSource("naver");
            setVwapLoading(false);
            return;
          }
        }
      }
    } catch(e) { console.warn("네이버 VWAP XML 파싱 실패", e); }

    try {
      const yahooUrl = "https://query1.finance.yahoo.com/v8/finance/chart/005930.KS?interval=1d&range=3mo";
      const text = await fetchTextViaProxies(yahooUrl);
      if (text) {
        const data = JSON.parse(text);
        const result = data?.chart?.result?.[0];
        const timestamps = result?.timestamp ?? [];
        const quotes = result?.indicators?.quote?.[0] ?? {};
        const stockData = timestamps.map((ts, i) => ({
          date: ts * 1000,
          close: quotes.close?.[i] ?? 0,
          volume: quotes.volume?.[i] ?? 0,
        })).filter(d => d.close > 0 && d.volume > 0);
        if (stockData.length > 0) {
          const vwapResult = calcFinalVwap(stockData);
          if (vwapResult) {
            setVwapPrice(vwapResult);
            setVwapSource("yahoo");
            setVwapLoading(false);
            return;
          }
        }
      }
    } catch(e) { console.warn("Yahoo VWAP 파싱 실패", e); }

    console.warn("VWAP 조회 실패 — 수동 입력 모드로 전환");
    setVwapPrice(null);
    setVwapLoading(false);
  };

  useEffect(() => { fetchCurrentPrice(); fetchVwapPrice(); }, []);

  const calc = useCallback(() => {
    const buPct = burate * 10, saPct = 100 - buPct;
    const spThreshold = (simYear >= 2026 && simYear <= 2028) ? 200 : 100;
    const isSpEligible = profit >= spThreshold;
    const appliedRerate = isSpEligible ? rerate : 10;
    const appliedSprate = isSpEligible ? sprate : 0;
    const totalCount = cntMemory + cntCommon + cntLepan;
    const ids = ["memory", "common", "lepan"];

    const _calcSpDistrib = (fund) => {
      if (fund <= 0 || totalCount === 0) {
        return { perMemory:0, perCommon:0, perLepan:0, buPerMan:0, saPerMemory:0, saPerCommon:0, saPerLepan:0 };
      }
      const commonRatio = ratCommon; 
      const denom = cntMemory + commonRatio * cntCommon + (buPct / 100) * cntLepan;
      const perMemory = denom > 0 ? (fund / denom) / MAN : 0;
      const perCommon = perMemory * commonRatio;
      const perLepan  = perMemory * (buPct / 100);
      const buPerMan    = perLepan;              
      const saPerMemory = perMemory - buPerMan;
      const saPerCommon = perCommon - buPerMan;
      const saPerLepan  = 0;
      return { perMemory, perCommon, perLepan, buPerMan, saPerMemory, saPerCommon, saPerLepan };
    };

    const opiTotalFund = profit * 1e12 * (appliedRerate / 100);
    const opiPerPersonBase = totalCount > 0 ? (opiTotalFund / totalCount) / MAN : 0;
    const t_opiTotalFund = profit * 1e12 * (rerate / 100);
    const t_opiPerPersonBase = totalCount > 0 ? (t_opiTotalFund / totalCount) / MAN : 0;
    const spTotalFund = profit * 1e12 * (appliedSprate / 100);
    const spD = _calcSpDistrib(spTotalFund);
    const spPerPerson = [spD.perMemory, spD.perCommon, spD.perLepan];
    const t_spTotalFund = profit * 1e12 * (sprate / 100);
    const t_spD = _calcSpDistrib(t_spTotalFund);
    const t_spPerPerson = [t_spD.perMemory, t_spD.perCommon, t_spD.perLepan];
    const myIdx = ids.indexOf(myDiv);
    const isCL1 = myCl === "CL1";
    const isCL4 = myCl === "CL4";
    
    // 직접 입력된 '올해 체결 연봉'을 그대로 커런트 샐러리로 사용
    const curSalary = contractedSalary;
    let bonusSalary = curSalary + bizPerfBonus;
    let excessCash = 0;
    if (isCL4 && curSalary > 13000) { bonusSalary = 13000 + bizPerfBonus; excessCash = curSalary - 13000; }
    let perf = 1.0;
    if (isCL4) { if (myRating === "EM") perf = 1.4; else if (myRating === "ES") perf = 1.2; }
    
    const usePrice = vwapPrice ? vwapPrice : manualBasePrice;
    const opiCap = isCL1 ? (bonusSalary * 7.0) : (bonusSalary * 0.5 * perf);
    const opi = Math.min(opiPerPersonBase * perf, opiCap);
    const opiPct = opiCap > 0 ? Math.min(opi / opiCap * 100, 100) : 0;
    const t_opi = Math.min(t_opiPerPersonBase * perf, opiCap);
    let sp = 0, isSpFixed24 = false;
    let t_sp = 0;
    const isLepanDeficit = (simYear >= 2027) && (lepanDeficit !== "none");
    if (isSpEligible) {
      if (myDiv === "lepan" && isLepanDeficit) { sp = (bonusSalary * 0.24) * perf; isSpFixed24 = true; }
      else { sp = spPerPerson[myIdx] * perf; }
    }
    if (myDiv === "lepan" && isLepanDeficit) { t_sp = (bonusSalary * 0.24) * perf; }
    else { t_sp = t_spPerPerson[myIdx] * perf; }
    const lostOpi = isSpEligible ? 0 : Math.max(0, t_opi - opi);
    const lostSp = isSpEligible ? 0 : Math.max(0, t_sp - sp);
    const lostTotal = lostOpi + lostSp;
    
    const annualGrossForTax = (isCL1 ? curSalary * 14 : curSalary) + bizPerfBonus;
    const curW = annualGrossForTax * MAN;
    const opiW = opi * MAN;
    const spW = sp * MAN;

    const samsungBasePay = bonusSalary / 24;
    const taiRateVal = parseFloat(samsungTaiRate);
    const samsungTaiHalf = samsungBasePay * taiRateVal;
    const samsungTaiAnnual = samsungTaiHalf * 2;
    const taiW = samsungTaiAnnual * MAN;

    const totalIncW = curW + opiW + spW + taiW;
    const taxBaseOnly  = totalTax(curW);
    const taxWithOpi   = totalTax(curW + opiW);
    const taxWithSp    = totalTax(curW + opiW + spW);
    const taxWithAll   = totalTax(totalIncW);

    const opiTaxWon  = Math.max(0, taxWithOpi  - taxBaseOnly);
    const spTaxWon   = Math.max(0, taxWithSp   - taxWithOpi);
    const taiTaxWon  = Math.max(0, taxWithAll  - taxWithSp);

    const opiTax = opiTaxWon / MAN;
    const opiNet = Math.max(0, opi - opiTax);
    const tax    = spTaxWon  / MAN;
    const spNet  = Math.max(0, sp  - tax);
    const taiTax = taiTaxWon / MAN;
    const taiNet = Math.max(0, samsungTaiAnnual - taiTax);

    const taxRate    = spW  > 0 ? spTaxWon  / spW  : 0;
    const taiTaxRate = taiW > 0 ? taiTaxWon / taiW : 0;

    const taxBaseMan = Math.max(0, totalIncW - workIncomeDeduction(totalIncW)) / MAN;
    const mySpBu = spD.buPerMan * perf;
    const mySpSa = (myIdx === 0 ? spD.saPerMemory : myIdx === 1 ? spD.saPerCommon : spD.saPerLepan) * perf;
    const healthRate = 0.03545, ltcRatio = 0.1295;
    const prevW = prevWithholding * MAN;
    const baseHW = Math.min(prevW, MAX_ANNUAL_WAGE) * healthRate;
    const totHW = Math.min(totalIncW, MAX_ANNUAL_WAGE) * healthRate;
    const healthAdd = (totHW - baseHW) / MAN;
    const ltcAdd = healthAdd * ltcRatio;
    const healthTotal = healthAdd + ltcAdd;
    const healthMonthly = healthTotal / 12;
    const isHealthCapped = totalIncW > MAX_ANNUAL_WAGE;
    const third = spNet / 3;
    const sharesEach = usePrice > 0 ? Math.floor(third * MAN / usePrice) : 0;
    const hynixTotalCount = 35000;
   
    const hynixContractSalary = curSalary;           
    const hynixBasePay = hynixContractSalary / 24;   
    const hynixPsThreshold = hynixBasePay * 10;      
    const hynixTaiRate = parseFloat(hynixMargin);
    const hynixTaiHalf = hynixBasePay * hynixTaiRate;  
    const hynixTaiAnnual = hynixTaiHalf * 2;           
    const hynixDcPct = hynixDcRate / 100;
    const hynixBaseW = hynixContractSalary * MAN;    
    
    const _calcHynixPS = (profitFactor) => {
      const hProfit = profit * profitFactor;
      const hPsTotalFund = hProfit * 1e12 * 0.10;
      const hPsAmt = hynixTotalCount > 0 ? (hPsTotalFund / hynixTotalCount) / MAN : 0;
      const hPsThisYear = hPsAmt > hynixPsThreshold ? hPsAmt * 0.8 : hPsAmt;
      const hTotal = hPsThisYear + hynixTaiAnnual;
      const hDcAmt = hTotal * hynixDcPct;
      const hCash = hTotal - hDcAmt;
      const hTaxFull = totalTax(hynixBaseW + hTotal * MAN);
      const hTaxCash = totalTax(hynixBaseW + hCash * MAN);
      const hDcSaving = Math.max(0, hTaxFull - hTaxCash) / MAN;
      const hDcMargRate = hDcAmt > 0 ? (hDcSaving / hDcAmt) * 100 : 0;
      
      const hBaseTax = totalTax(hynixBaseW);
      const hBonusTaxWon = Math.max(0, hTaxFull - hBaseTax);
      const hBonusTax = hBonusTaxWon / MAN;
      const hNetTotal = Math.max(0, hTotal - hBonusTax);
      const hTaxRate = hTotal > 0 ? hBonusTaxWon / (hTotal * MAN) : 0;
      
      const hNetPs = hTotal > 0 ? Math.max(0, hPsThisYear - hBonusTax * (hPsThisYear / hTotal)) : 0;
      const hNetPi = hTotal > 0 ? Math.max(0, hynixTaiAnnual - hBonusTax * (hynixTaiAnnual / hTotal)) : 0;
      return { psAmount: hPsAmt, psThisYear: hPsThisYear, totalThisYear: hTotal, dcAmount: hDcAmt, cashAfterDc: hCash, dcTaxSaving: hDcSaving, dcMarginalRate: hDcMargRate, bonusTax: hBonusTax, netTotal: hNetTotal, taxRate: hTaxRate, netPs: hNetPs, netPi: hNetPi };
    };
    const hynixSame = _calcHynixPS(1.0);
    const hynix70 = _calcHynixPS(0.7);
    const hynixActive = hynixProfitMode === "same" ? hynixSame : hynix70;
    const hynixPsAmount = hynixActive.psAmount;
    const hynixPsThisYear = hynixActive.psThisYear;
    const hynixTotalThisYear = hynixActive.totalThisYear;
    const hynixDcAmount = hynixActive.dcAmount;
    const hynixCashAfterDc = hynixActive.cashAfterDc;
    const hynixDcTaxSaving = hynixActive.dcTaxSaving;
    const hynixDcMarginalRate = hynixActive.dcMarginalRate;
    return {
      bizPerfBonus, curSalary, bonusSalary, excessCash, perf, usePrice, isCL1, isCL4,
      opi, opiCap, opiPct, opiTax, opiNet, sp, isSpFixed24, tax, spNet, taxRate,
      totalIncW, prevWithholding, taxBaseMan, healthAdd, ltcAdd, healthTotal, healthMonthly, isHealthCapped,
      third, sharesEach, totalBonus: opi + sp + excessCash + bizPerfBonus + samsungTaiAnnual,
      isSpEligible, spThreshold, appliedSprate, appliedRerate, rerate,
      opiTotalFund, spTotalFund, buPct, saPct, lostOpi, lostSp, lostTotal,
      opiPerPersonBase, mySpBu, mySpSa,
      spBuPerMan: spD.buPerMan,
      spSaPerMemory: spD.saPerMemory,
      spSaPerCommon: spD.saPerCommon,
      spSaPerLepan: spD.saPerLepan,
      spTotalPerMemory: spPerPerson[0],
      spTotalPerCommon: spPerPerson[1],
      spTotalPerLepan: spPerPerson[2],
      samsungBasePay, samsungTaiHalf, samsungTaiAnnual, taiTax, taiNet, taiTaxRate, taiRateVal,
      hynixBasePay, hynixContractSalary,
      hynixPsAmount, hynixPsThisYear, hynixTaiHalf, hynixTaiAnnual, hynixTotalThisYear, hynixTaiRate,
      hynixDcRate, hynixDcAmount, hynixCashAfterDc, hynixDcTaxSaving, hynixDcMarginalRate,
      hynixSame, hynix70, hynixActive,
    };
  }, [simYear, myDiv, myCl, contractedSalary, bizPerfBonus, myRating, manualBasePrice, vwapPrice,
      prevWithholding, profit, rerate, sprate, burate, cntMemory, cntCommon, cntLepan,
      ratMemory, ratCommon, ratLepan, lepanDeficit, hynixMargin, hynixDcRate, hynixProfitMode, samsungTaiRate]);

  const r = calc();

  const sBase = {
    inBox: { background:"#0e1525", border:"1px solid rgba(255,255,255,0.1)", borderRadius:11, padding:"11px 13px" },
    row: { display:"flex", justifyContent:"space-between", alignItems:"center" },
    select: { width:"100%", background:"#0e1525", border:"1px solid rgba(255,255,255,0.14)", borderRadius:10, padding:"10px 13px", color:"#e8eaf0", fontSize:14, fontWeight:700, fontFamily:"inherit", outline:"none", cursor:"pointer" },
  };

  const multiTagHtml = r.perf > 1.0
    ? <span style={{fontSize:11, color:"#FFD700", background:"rgba(255,215,0,0.15)", border:"1px solid rgba(255,215,0,0.3)", padding:"3px 8px", borderRadius:5, marginLeft:8}}>
        {myRating} ({r.perf}배) 적용
      </span>
    : null;

  const tabs = [
    { icon:"👤", label:"내 정보" },
    { icon:"📊", label:"시뮬레이션" },
    { icon:"💰", label:"산출결과" },
    { icon:"📖", label:"로직 설명" },
    { icon:"💬", label:"게시판" },
    { icon:"🔐", label:"내 연봉 DB" },
  ];

  const numResultCols = 2 + (r.bizPerfBonus>0?1:0) + (r.excessCash>0?1:0) + (r.samsungTaiAnnual>0?1:0) + 1;

  /* ── 결과 패널 ── */
  const ResultPanel = () => (
    <div style={{ display:"flex", flexDirection:"column", gap:0, padding:"20px 22px 30px" }}>
      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:11, color:"#1E90FF", letterSpacing:"0.12em", fontWeight:800, marginBottom:4 }}>결과 요약</div>
        <div style={{ fontSize:20, fontWeight:900, background:"linear-gradient(90deg,#fff,#7ec8ff)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>성과급 계산 결과</div>
        <div style={{ marginTop:8, display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
          <span style={{ fontSize:11, background:"rgba(0,198,255,0.1)", border:"1px solid rgba(0,198,255,0.25)", color:"#00C6FF", borderRadius:7, padding:"3px 10px", fontWeight:700 }}>
            DS 영업이익: {profit}조
          </span>
          {dsAutoMode && (
            <span style={{ fontSize:11, background:"rgba(160,174,192,0.1)", border:"1px solid rgba(160,174,192,0.2)", color:"#A0AEC0", borderRadius:7, padding:"3px 10px" }}>
              전사 {totalProfit}조 × DS {dsRatio}% 자동환산
            </span>
          )}
          <span style={{ fontSize:11, background: r.isSpEligible ? "rgba(0,220,130,0.1)" : "rgba(255,107,107,0.1)", border:`1px solid ${r.isSpEligible ? "rgba(0,220,130,0.25)" : "rgba(255,107,107,0.25)"}`, color: r.isSpEligible ? "#00DC82" : "#FF6B6B", borderRadius:7, padding:"3px 10px", fontWeight:700 }}>
            허들 {r.isSpEligible ? "✅ 달성" : "❌ 미달"} ({r.spThreshold}조)
          </span>
        </div>
      </div>

      <div className="summary-grid" style={{ gridTemplateColumns:`repeat(${numResultCols},1fr)` }}>
        {[
          {label:"OPI(세후)", val:fmtM(r.opiNet), color:"#00C6FF"},
          {label:"특별성과(세후)", val:fmtM(r.spNet), color:"#FFB400"},
          ...(r.samsungTaiAnnual>0?[{label:"TAI/PI(세후)",val:fmtM(r.taiNet),color:"#A78BFA"}]:[]),
          ...(r.bizPerfBonus>0?[{label:"업무성과",val:fmtM(r.bizPerfBonus),color:"#34D399"}]:[]),
          ...(r.excessCash>0?[{label:"연봉초과",val:fmtM(r.excessCash),color:"#FF6B6B"}]:[]),
          {label:"총 영끌(세전)", val:fmtM(r.totalBonus), color:"#fff"},
        ].map(item=>(
          <div key={item.label} style={{ background:"#0e1828", borderRadius:12, padding:"12px 8px", textAlign:"center", border:"1px solid rgba(255,255,255,0.1)" }}>
            <div style={{ fontSize:10, color:"#CBD5E1", marginBottom:5, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{item.label}</div>
            <div style={{ fontSize:12, fontWeight:800, color:item.color, lineHeight:1.3 }}>{item.val}</div>
          </div>
        ))}
      </div>

      <ResultCard icon="📈" title="OPI (연간 성과인센티브)" valueColor="#00C6FF"
        sub={<>{r.isCL1 ? '기초액의 최대 700% 한도' : `연봉의 최대 ${(50*r.perf).toFixed(0)}% 한도`} <span style={{marginLeft:6, color:"#CBD5E1"}}>*전사 공통 비율 적용</span></>}
        value={fmtM(r.opi)} accent="rgba(0,198,255,0.08)">
        {multiTagHtml && <div style={{ display:"flex", alignItems:"center", marginBottom:10 }}>{multiTagHtml}</div>}
        <div className="card-status-grid" style={{ gridTemplateColumns:"1fr 1fr 1fr" }}>
          {[
            {label: r.isCL1 ? "기준 기초액" : "기준 연봉", val:comma(r.bonusSalary)+"만", color:"#E2E8F0"},
            {label: r.isCL1 ? "한도 700%" : `한도 ${(50*r.perf).toFixed(0)}%`, val:fmtM(r.opiCap), color:"#00C6FF"},
            {label:"풀 계산값", val:fmtM(r.opiPerPersonBase*r.perf), color:(r.opiPerPersonBase*r.perf)>=r.opiCap?"#FF6B6B":"#E2E8F0"},
          ].map(item=>(
            <div key={item.label} style={{ background:"rgba(255,255,255,0.04)", borderRadius:10, padding:"9px 6px", textAlign:"center" }}>
              <div style={{ fontSize:10, color:"#CBD5E1", marginBottom:3 }}>{item.label}</div>
              <div style={{ fontSize:12, fontWeight:800, color:item.color }}>{item.val}</div>
            </div>
          ))}
        </div>
        <div style={{ height:6, background:"#0a0f1a", borderRadius:99, overflow:"hidden", marginBottom:10 }}>
          <div style={{ width:`${r.opiPct}%`, height:"100%", background:"linear-gradient(90deg,#00C6FF,#7C83FF)", borderRadius:99 }}/>
        </div>
        {r.opi > 0 && (
          <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
            {[
              {label:"추가 소득세+지방세 (한계세율 적용)", val:`－ ${fmtM(r.opiTax)}`, color:"#FF6B6B"},
              {label:"세후 OPI 수령액 (추정)", val:fmtM(r.opiNet), color:"#00C6FF", bold:true},
            ].map(item=>(
              <div key={item.label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(255,255,255,0.04)", borderRadius:10, padding:"9px 12px" }}>
                <span style={{ fontSize:12, color:"#94A3B8" }}>{item.label}</span>
                <span style={{ fontSize:13, fontWeight:item.bold?800:600, color:item.color }}>{item.val}</span>
              </div>
            ))}
          </div>
        )}
      </ResultCard>

      {r.sp > 0 ? (
        <ResultCard icon="⭐" title="특별성과급" valueColor="#FFB400"
          sub={`세후 자사주 지급 · DS영업이익×${r.appliedSprate}% (OPI와 독립 재원)`} value={fmtM(r.sp)} accent="rgba(255,180,0,0.08)">
          {multiTagHtml && <div style={{ display:"flex", alignItems:"center", marginBottom:10 }}>{multiTagHtml}</div>}
          {currentPrice && currentPrice > 0 && (
            <div style={{ background:"rgba(0,220,130,0.08)", border:"1px solid rgba(0,220,130,0.2)", borderRadius:12, padding:"10px 12px", marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                <span style={{ fontSize:11, color:"#00DC82" }}>
                  📈 현재 주가 (참고)
                  {priceSource && <span style={{ fontSize:10, color:"#4ade8066", marginLeft:5 }}>[{priceSource === "naver" ? "네이버" : "Yahoo"}]</span>}
                </span>
                <span style={{ fontSize:14, fontWeight:800, color:"#00DC82" }}>{comma(currentPrice)}원</span>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <span style={{ fontSize:11, color:"#00DC82aa" }}>현재 주가 기준 총 평가액</span>
                <span style={{ fontSize:12, fontWeight:700, color:"#00DC82" }}>{fmtM((r.sharesEach * 3 * currentPrice) / 10000)}</span>
              </div>
            </div>
          )}
          {r.isSpFixed24 ? (
            <div style={{ background:"rgba(255,107,107,0.1)", border:"1px solid rgba(255,107,107,0.3)", borderRadius:10, padding:"8px 12px", marginBottom:8, fontSize:12, color:"#FF6B6B" }}>
              르팡 적자 — {r.isCL1 ? "기준기초액" : "기준연봉"} 24% 고정 배정
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:5, marginBottom:10 }}>

          <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:12, padding:"10px 12px", marginBottom:10 }}>
            <div style={{ fontSize:11, color:"#FFB400", fontWeight:800, marginBottom:8 }}>
              📊 사업부별 1인당 비교 <span style={{fontSize:10, color:"#94A3B8", fontWeight:400}}>(세전 · 기본고과 1.0배 기준)</span>
            </div>
            {[
              { label:"메모리", cnt:cntMemory, buAmt:r.spBuPerMan, saAmt:r.spSaPerMemory, total:r.spTotalPerMemory, color:"#00C6FF", note:"기준 (1인당 지급액 = 메모리 기준값)", id:"memory" },
              { label:"공통",   cnt:cntCommon, buAmt:r.spBuPerMan, saAmt:r.spSaPerCommon, total:r.spTotalPerCommon, color:"#FFD700", note:`(부문+사업부) 합산 = 메모리의 ${(ratCommon*100).toFixed(0)}% 고정`, id:"common" },

              <div>하이닉스 비교는 <b>삼성전자와 동일한 계약연봉</b>을 기준으로 산출합니다.</div>
              <ul className="logic-ul">
                <li>삼성전자 연봉 입력값과 동일한 금액을 하이닉스 계약연봉으로 사용</li>
                <li>삼성 전용 항목(업무성과급 등 변동분)은 하이닉스 기준에서 제외</li>
              </ul>

              <div className="logic-title" style={{color:"#FF6B6B"}}>3. PI (생산성격려금) 계산</div>
              <div>PI는 <b>월 기준급</b>을 기준으로 지급됩니다. (삼성 TAI와 동일 기준 가정)</div>
              <ul className="logic-ul">
                <li>월 기준급 = <b>계약연봉 ÷ 24</b></li>
                <li>반기 PI = 월 기준급 × 영업이익률 구간별 비율 (0% ~ 150%)</li>
                <li>연간 PI = 반기 PI × 2회 (상·하반기)</li>
              </ul>
              <div style={{background:"rgba(255,100,100,0.08)", border:"1px solid rgba(255,100,100,0.25)", borderRadius:8, padding:"8px 10px", marginTop:6, fontSize:12, color:"#CBD5E1"}}>
                예시: 연봉 8,000만원 → 기준급 333만원<br/>
                영업이익률 30%↑(PI 150%): 반기 PI = 333 × 150% = 500만원 → 연간 1,000만원
              </div>

              <div className="logic-title" style={{color:"#FF6B6B"}}>4. PS (초과이익분배금) 계산</div>
              <div>PS는 <b>영업이익의 10%</b>를 전체 인원으로 균등 배분합니다.</div>
              <ul className="logic-ul">
                <li>PS 1인당 = 영업이익 × 10% ÷ 3.5만명</li>
                <li>PS 금액 {">"} 기준급 × 10개월 초과 시: 80% 당해 지급, 20% 이듬해 지급</li>
              </ul>

              <div className="logic-title" style={{color:"#FF6B6B"}}>5. 세금 적용</div>
              <div>하이닉스 세금은 <b>동일 계약연봉 기준</b>으로 한계세율 방식으로 추정합니다.</div>
              <ul className="logic-ul">
                <li>세금 기준 연소득 = 하이닉스 계약연봉 (삼성 업무성과급 제외)</li>
                <li>성과급(PS+PI)에 한계세율 적용 → 삼성과 동일한 누진세율 구조 사용</li>
              </ul>
            </div>
          </FieldBox>

          <FieldBox label="세금 및 건강보험료 추정" accent="rgba(0,220,130,0.3)">
            <div className="logic-text">
              <div className="logic-title" style={{color:"#00DC82"}}>1. 근로소득공제 및 과세표준 산출</div>
              <div>총소득에서 <b>근로소득공제</b>를 차감하여 과세표준을 산출합니다.</div>
              <ul className="logic-ul">
                <li>기준: <b>당해 총소득 (기준연봉 + 업무성과급 + OPI + 특별성과급 + TAI/PI 전부 합산)</b></li>
                <li>TAI(PI)와 업무성과급도 근로소득으로서 동일하게 누진세율 과세 대상입니다.</li>
                <li>각 항목의 세금은 <b>누적 방식</b>으로 계산됩니다: 연봉 → OPI → SP → TAI 순서로 이전 합산 세액과의 차이로 산출.</li>
                <li>근로소득공제 한도: 총급여 1억 원 초과 시 <b>최대 1,475만 원</b>으로 고정됩니다.</li>
              </ul>

              <div className="logic-title" style={{color:"#00DC82"}}>2. 소득세율 구간 (누진세율 적용)</div>
              <div>과세표준에 따라 <b>6% ~ 45%</b>의 누진세율이 적용됩니다.</div>
              <ul className="logic-ul">
                <li>1,400만 원 이하: <b>6%</b> | 5,000만 원 이하: <b>15%</b></li>
                <li>8,800만 원 이하: <b>24%</b> | 1.5억 원 이하: <b>35%</b></li>
                <li>3억 원 이하: <b>38%</b> | 5억 원 이하: <b>40%</b></li>
                <li><b>지방소득세 가산:</b> 산출된 근로소득세의 <b>10%</b>가 추가 부과됩니다. (실제 구간별 체감세율은 6.6% ~ 49.5%)</li>
              </ul>

              <div className="logic-title" style={{color:"#00DC82"}}>3. 성과급 한계세율 (세금 폭탄의 이유)</div>
              <div>성과급은 연봉 위에 얹혀지는 '추가 소득'이므로, 본인의 <b>최상위 과세구간(한계세율)</b>이 통째로 적용됩니다.</div>
              <ul className="logic-ul">
                <li>예: 기준급이 이미 8,800만 원을 초과했다면, 추가로 들어오는 성과급 전액에 대해 <b>최소 38.5%</b> (소득세 35% + 지방세 3.5%)의 세금이 부과됩니다.</li>
              </ul>

              <div className="logic-title" style={{color:"#00DC82"}}>4. 건강보험료 및 장기요양보험료 정산 (차년도 4~5월)</div>
              <div>추가징수액 = <b>(올해 총소득 - 전년도 원천징수) × 건보료율(3.545%)</b></div>
              <ul className="logic-ul">
                <li>전년도 소득(기납부액) 대비 올해 소득이 증가한 만큼 다음 해 건보료 정산 시 추가 공제됩니다.</li>
                <li>장기요양보험료(건보료의 12.95%)도 비례하여 추가 징수됩니다.</li>
                <li><b>건보료 상한액:</b> 보수월액 상한액(24년 기준 연 14억 3,550만 원) 초과 소득에 대해서는 건보료가 더 이상 부과되지 않습니다.</li>
              </ul>
            </div>
          </FieldBox>
        </>
      )}
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", minHeight:"100vh", background:"#080c14" }}>
      {/* ── 상단 반응형 헤더 ── */}
      <div className="header">
        <div className="header-left">
          <div>
            <div style={{ fontSize:10, color:"#1E90FF", letterSpacing:"0.18em", fontWeight:700 }}>SAMSUNG ELECTRONICS</div>
            <div style={{ fontSize:17, fontWeight:900, background:"linear-gradient(90deg,#fff,#7ec8ff)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", lineHeight:1.2 }}>성과급 계산기</div>
          </div>
          <div className="nav-tabs">
            {tabs.map((t,i) => (
              <button key={i} onClick={() => setTab(i)} style={{
                padding:"7px 18px", border:"none", cursor:"pointer", fontFamily:"inherit",
                borderRadius:9, display:"flex", alignItems:"center", gap:6,
                background: tab===i ? "rgba(30,144,255,0.18)" : "none",
                transition:"all .18s",
              }}>
                <span style={{ fontSize:15 }}>{t.icon}</span>
                <span style={{ fontSize:13, fontWeight:700, color: tab===i ? "#4DA8FF" : "#94A3B8" }}>{t.label}</span>
              </button>
            ))}
          </div>
        </div>
        <div className="header-right" style={{ fontSize:10, color:"#94A3B8", textAlign:"right", lineHeight:1.5 }}>
          made by<br/><span style={{ color:"#E2E8F0", fontWeight:700 }}>초기업_눙물이또르륵</span>
        </div>
      </div>

      {/* ── 반응형 바디 레이아웃 ── */}
      <div className="main-layout">
        {tab === 4 ? (
          <div style={{ flex:1, overflowY:'auto', background:'transparent' }}>
            <CommentBoard />
          </div>
        ) : tab === 5 ? (
          <div style={{ flex:1, overflowY:'auto', background:'transparent' }}>
            <SalaryDB contractedSalary={contractedSalary} setContractedSalary={setContractedSalary} />
          </div>
        ) : (
          <>
            <div className={`sidebar ${tab === 2 ? 'hide-on-pc hide-on-mobile' : ''}`}>
              {SettingsContent()}
            </div>
            
            <div className={`content-panel ${tab !== 2 ? 'hide-on-mobile' : ''}`}>
              <div style={{ maxWidth: tab === 2 ? "800px" : "100%", margin: "0 auto", width: "100%", height: "100%" }}>
                {ResultPanel()}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
